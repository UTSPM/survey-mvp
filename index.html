<!DOCTYPE html>
<html>
<head>
    <title>ASNB Customer Feedback</title>
    <meta charset="utf-8">

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        .container {
            max-width: 480px;
            margin: 60px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo img {
            height: 42px;
        }

        h2 {
            text-align: center;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #555;
            font-size: 14px;
        }

        .stars {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 18px;

        }

        .star {
            font-size: 34px;
            margin: 0 5px;
            cursor: pointer;
            color: #ccc;
            transition: color 0.2s ease, transform 0.15s ease;
        }

        .star:hover {
            transform: scale(1.08);
        }
        
        .star.selected {
            color: #ffb400;
        }

        .rating-label {
            text-align: center;
            margin-top: 8px;
            font-weight: bold;
            color: #444;
        }

        textarea {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            height: 100px;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: #0057b8;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 8px;
        }

        button:disabled {
            background-color: #999;
        }

        .success {
            text-align: center;
            font-size: 18px;
            color: green;
        }

        .small {
            font-size: 12px;
            color: #777;
            text-align: center;
            margin-top: 15px;
        }

        .hidden {
            display: none;
        }

    </style>
</head>

    <h2>Share your experience</h2>
    <p class="subtitle">Your feedback helps us improve our service to you</p>

    <!-- Personalisation placeholder -->
    <p class="subtitle" id="rmText"></p>

    <div id="survey">

        <div class="stars">
            <span class="star" onclick="setRating(1)">★</span>
            <span class="star" onclick="setRating(2)">★</span>
            <span class="star" onclick="setRating(3)">★</span>
            <span class="star" onclick="setRating(4)">★</span>
            <span class="star" onclick="setRating(5)">★</span>
        </div>

        <div class="rating-label" id="ratingLabel">
            Select a rating
        </div>

        <textarea id="feedback" placeholder="Additional feedback (optional)"></textarea>

        <button id="submitBtn" onclick="submitSurvey()" class="asnb-submit-btn" style="
            .asnb-submit-btn {
                margin-top: 25px;
                width: 100%;
                padding: 14px;
                background-color: #0072CE;
                color: white;
                font-size: 16px;
                font-weight: 600;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
                transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
            }
            
            .asnb-submit-btn:hover {
                background-color: #005FA3;
                transform: translateY(-1px);
                box-shadow: 0 6px 14px rgba(0, 0, 0, 0.16);
            }
            
            .asnb-submit-btn:active {
                transform: translateY(0);
                box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
            }
            
            .asnb-submit-btn:disabled {
                background-color: #9aa7b2;
                cursor: not-allowed;
                box-shadow: none;
                transform: none;
            }

            @media screen and (max-width: 600px) {
                body {
                    background-color: #ffffff;
                }
            
                .container {
                    max-width: none;
                    width: auto;
                    margin: 0;
                    min-height: 100vh;
                    padding: 28px 20px;
                    border-radius: 0;
                    box-shadow: none;
                    box-sizing: border-box;
                }
            
                .logo img {
                    height: 44px;
                    max-width: 180px;
                }
            
                h2 {
                    font-size: 22px;
                    line-height: 1.3;
                    margin-top: 10px;
                }
            
                .subtitle {
                    font-size: 14px;
                    line-height: 1.5;
                }
            
                .stars {
                    margin-top: 22px;
                    gap: 4px;
                }
            
                .star {
                    font-size: 38px;
                    margin: 0 3px;
                    line-height: 1.2;
                }
            
                .rating-label {
                    font-size: 15px;
                    margin-top: 10px;
                }
            
                textarea {
                    width: 100%;
                    box-sizing: border-box;
                    min-height: 110px;
                    font-size: 15px;
                    margin-top: 22px;
                }
            
                .asnb-submit-btn {
                    margin-top: 24px;
                    padding: 15px;
                    font-size: 16px;
                    border-radius: 10px;
                }
            
                .success {
                    font-size: 17px;
                    line-height: 1.5;
                    padding-top: 30px;
                }
            
                .small {
                    font-size: 12px;
                    line-height: 1.4;
                }
            }
        ">
            Complete Survey
        </button>

    </div>

    <div id="success" class="success hidden">
        ✅ Thank you! Your feedback has been submitted successfully.
        <div class="small">We appreciate your time and input.</div>
    </div>

    <div class="small">
        © ASNB Customer Experience
    </div>

</div>

<script>

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const rmName = urlParams.get('rmName');
    
    window.onload = function () {

        console.log("Submit button clicked");
        console.log("TOKEN:", token);
        console.log("RM NAME:", rmName);
    
        const rmTextElement = document.getElementById("rmText");
    
        if (rmTextElement && rmName) {
            rmTextElement.innerText = "How was your engagement with " + rmName + "?";
        }
    
    };
    
    let rating = 0;

    // OPTIONAL: RM dynamic hook (future use)
    // document.getElementById("rmText").innerText = "";

    const labels = {
        1: "Very Poor",
        2: "Poor",
        3: "Average",
        4: "Good",
        5: "Excellent"
    };

    function setRating(value) {
        rating = value;

        document.getElementById("ratingLabel").innerText = labels[value];

        const stars = document.querySelectorAll(".star");

        stars.forEach((star, index) => {
            star.classList.toggle("selected", index < value);
        });
    }

function submitSurvey() {

    if (rating === 0) {
        alert("Please select a rating before submitting.");
        return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerText = "Submitting...";

    const feedback = document.getElementById("feedback").value;

    console.log("Submit button clicked");
    console.log("TOKEN:", token);
    console.log("RM NAME:", rmName);
    console.log("Sending request now...");

    const baseUrl = "https://default2a28b15bb6664096a92f98f699a881.7b.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/e67cf675e2bb4c5dbfae30be42c5c97a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=X491WKuxww87_pfxx7Kgq9t_FVqOpJmMqLuESW4pdA8";

    const submitUrl =
        baseUrl +
        "&token=" + encodeURIComponent(String(token || "")) +
        "&rmName=" + encodeURIComponent(String(rmName || "")) +
        "&score=" + encodeURIComponent(String(rating)) +
        "&feedback=" + encodeURIComponent(String(feedback || ""));

    console.log("FINAL SUBMIT URL:", submitUrl);
    
    fetch(submitUrl, {
        method: "POST",
        mode: "no-cors"
    }).catch(() => {});

    setTimeout(() => {
        document.getElementById("survey").style.display = "none";
        document.getElementById("success").classList.remove("hidden");
    }, 800);
}

</script>
