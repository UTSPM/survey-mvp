<!DOCTYPE html>
<html>
<head>
    <title>ASNB Customer Feedback</title>
    <meta charset="utf-8">

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
        }

        .container {
            max-width: 480px;
            margin: 80px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo img {
            height: 40px;
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-top: 0;
        }

        label {
            margin-top: 25px;
            display: block;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: vertical;
            height: 100px;
        }

        .stars {
            margin-top: 10px;
        }

        .star {
            font-size: 30px;
            cursor: pointer;
            color: #ccc;
        }

        .star.selected {
            color: #ffb400;
        }

        button {
            width: 100%;
            margin-top: 30px;
            padding: 12px;
            background-color: #0057b8;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 8px;
        }

        button:disabled {
            background-color: #999;
        }

        .success {
            text-align: center;
            font-size: 18px;
            color: green;
        }

        .loader {
            text-align: center;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="logo">
        <!-- Replace with your logo -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg">
    </div>

    <h2>Customer Feedback</h2>
    <p class="subtitle">Your feedback helps us improve our service experience</p>

    <div id="error" class="hidden">
        Invalid survey link.
    </div>

    <div id="survey">

        <label>How would you rate your recent engagement?</label>

        <div class="stars">
            <span class="star" onclick="setRating(1)">★</span>
            <span class="star" onclick="setRating(2)">★</span>
            <span class="star" onclick="setRating(3)">★</span>
            <span class="star" onclick="setRating(4)">★</span>
            <span class="star" onclick="setRating(5)">★</span>
        </div>

        <label>Additional feedback (optional)</label>
        <textarea id="feedback" placeholder="Tell us how we can improve..."></textarea>

        <button id="submitBtn" onclick="submitSurvey()">Submit</button>

        <div id="loading" class="loader hidden">
            Submitting...
        </div>

    </div>

    <div id="success" class="success hidden">
        ✅ Thank you for your feedback!
    </div>

    <div class="footer">
        © ASNB Customer Experience
    </div>

</div>

<script>

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    let rating = 0;

    if (!token) {
        document.getElementById("survey").style.display = "none";
        document.getElementById("error").classList.remove("hidden");
    }

    function setRating(value) {
        rating = value;
        const stars = document.querySelectorAll(".star");

        stars.forEach((star, index) => {
            star.classList.toggle("selected", index < value);
        });
    }

        if (rating === 0) {
            alert("Please select a rating.");
            return;
        }
