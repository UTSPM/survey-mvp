<!DOCTYPE html>
<html>
<head>
    <title>ASNB Customer Feedback</title>
    <meta charset="utf-8">

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        .container {
            max-width: 480px;
            margin: 60px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .logo {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo img {
            height: 42px;
        }

        h2 {
            text-align: center;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #555;
            font-size: 14px;
        }

        .stars {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .star {
            font-size: 34px;
            margin: 0 5px;
            cursor: pointer;
            color: #ccc;
        }

        .star.selected {
            color: #ffb400;
        }

        .rating-label {
            text-align: center;
            margin-top: 8px;
            font-weight: bold;
            color: #444;
        }

        textarea {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            height: 100px;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: #0057b8;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 8px;
        }

        button:disabled {
            background-color: #999;
        }

        .success {
            text-align: center;
            font-size: 18px;
            color: green;
        }

        .small {
            font-size: 12px;
            color: #777;
            text-align: center;
            margin-top: 15px;
        }

        .hidden {
            display: none;
        }
