<script>

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    let rating = 0;

    const labels = {
        1: "Very Poor",
        2: "Poor",
        3: "Average",
        4: "Good",
        5: "Excellent"
    };

    function setRating(value) {
        rating = value;

        document.getElementById("ratingLabel").innerText = labels[value];

        const stars = document.querySelectorAll(".star");
        stars.forEach((star, index) => {
            star.classList.toggle("selected", index < value);
        });
    }

    function submitSurvey() {

        if (rating === 0) {
            alert("Please select a rating before submitting.");
            return;
        }

        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.innerText = "Submitting...";

        const feedback = document.getElementById("feedback").value;

        fetch("https://default2a28b15bb6664096a92f98f699a881.7b.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/e67cf675e2bb4c5dbfae30be42c5c97a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=X491WKuxww87_pfxx7Kgq9t_FVqOpJmMqLuESW4pdA8", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                token: token,
                score: rating,
                feedback: feedback
            })
        })
        .then(() => {
            document.getElementById("survey").style.display = "none";
            document.getElementById("success").classList.remove("hidden");
        })
        .catch((error) => {
            console.error(error);
            alert("Submission failed. Please try again.");
        });

    }

</script>
``
